version: '3.8'

services:
  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        - VITE_API_URL=/api
    image: serique-avenue-frontend:latest
    container_name: serique-frontend
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: always
    networks:
      - serique-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: serique-avenue-backend:latest
    container_name: serique-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env.docker
    depends_on:
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: always
    networks:
      - serique-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: serique-redis
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - serique-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (Optional for additional routing)
  # Uncomment if you need additional routing beyond the frontend nginx
  # nginx:
  #   image: nginx:alpine
  #   container_name: serique-nginx
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./nginx-prod.conf:/etc/nginx/nginx.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - frontend
  #   restart: always
  #   networks:
  #     - serique-network

volumes:
  redis_data:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local

networks:
  serique-network:
    driver: bridge

# Production Notes:
# 1. Set .env.docker with actual production values
# 2. Set secure Redis password (change from default)
# 3. Mount volumes for persistence
# 4. Add SSL/TLS configuration for HTTPS
# 5. Consider using Docker registry/repository for images
# 6. Add monitoring and logging (ELK stack, Prometheus, etc.)
# 7. Implement backup strategy for volumes
# 8. Use secrets management for sensitive data
