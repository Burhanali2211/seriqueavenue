[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never cache index.html — always serve fresh so users get correct chunk URLs after deploy
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# Cache hashed assets forever (safe because content hash changes when content changes)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
